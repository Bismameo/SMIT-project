<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Marksheet - Bootstrap Version</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding-top: 50px;
            padding-bottom: 50px;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .card-header {
            background-color: #0d6efd;
            color: white;
            border-radius: 15px 15px 0 0 !important;
            text-align: center;
            font-weight: bold;
        }
        .result-card {
            display: none;
            margin-top: 20px;
        }
        .badge-grade {
            font-size: 1.2rem;
            padding: 10px 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            
            <!-- Input Card -->
            <div class="card mb-4">
                <div class="card-header py-3">
                    <h4 class="mb-0">Student Information</h4>
                </div>
                <div class="card-body p-4">
                    <div class="row g-3">
                        <div class="col-sm-6">
                            <label class="form-label">Student Name</label>
                            <input type="text" id="name" class="form-control" placeholder="Enter Name">
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label">Roll Number</label>
                            <input type="text" id="rollNo" class="form-control" placeholder="Enter Roll No">
                        </div>
                    </div>
                    
                    <hr class="my-4">
                    
                    <h5 class="mb-3 text-secondary">Add Subjects & Marks</h5>
                    <div class="row g-3">
                        <div class="col-sm-7">
                            <input type="text" id="subject" class="form-control" placeholder="Subject Name">
                        </div>
                        <div class="col-sm-5">
                            <input type="number" id="marks" class="form-control" placeholder="Marks (0-100)">
                        </div>
                        <div class="col-12">
                            <button class="btn btn-outline-primary w-100" onclick="addSubject()">
                                <i class="bi bi-plus-circle"></i> Add Subject
                            </button>
                        </div>
                    </div>

                    <div id="subjectsList" class="mt-3">
                        <!-- Subjects will appear here -->
                    </div>

                    <div class="mt-4 d-grid gap-2">
                        <button class="btn btn-primary btn-lg" onclick="generateMarksheet()">Generate Marksheet</button>
                        <button class="btn btn-link text-danger" onclick="resetForm()">Clear All</button>
                    </div>
                </div>
            </div>

            <!-- Result Card -->
            <div id="resultCard" class="card result-card">
                <div class="card-header bg-success py-3">
                    <h4 class="mb-0">Official Marksheet</h4>
                </div>
                <div class="card-body p-4" id="output">
                    <!-- Marksheet content will be injected here -->
                </div>
                <div class="card-footer text-center bg-light">
                    <button class="btn btn-secondary btn-sm" onclick="window.print()">Print Marksheet</button>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    var subjectsArray = [];

    function addSubject() {
        var subjectInput = document.getElementById("subject");
        var marksInput = document.getElementById("marks");
        var subjectName = subjectInput.value.trim();
        var marksValue = parseInt(marksInput.value);

        if (subjectName === "" || isNaN(marksValue)) {
            alert("Please enter both subject name and marks.");
            return;
        }

        if (marksValue < 0 || marksValue > 100) {
            alert("Marks must be between 0 and 100.");
            return;
        }

        subjectsArray.push({ name: subjectName, marks: marksValue });

        // Update list display using Bootstrap Badges
        var listDiv = document.getElementById("subjectsList");
        var badges = subjectsArray.map(s => 
            `<span class="badge bg-light text-dark border me-1 mb-1">${s.name}: ${s.marks}</span>`
        ).join("");
        listDiv.innerHTML = `<p class="mb-0"><small class="text-muted">Added:</small><br>${badges}</p>`;

        subjectInput.value = "";
        marksInput.value = "";
        subjectInput.focus();
    }

    function generateMarksheet() {
        var name = document.getElementById("name").value.trim();
        var roll = document.getElementById("rollNo").value.trim();
        var output = document.getElementById("output");
        var resultCard = document.getElementById("resultCard");

        if (name === "" || roll === "" || subjectsArray.length === 0) {
            alert("Please complete student info and add at least one subject.");
            return;
        }

        var totalMarks = 0;
        var maxPossibleMarks = subjectsArray.length * 100;
        var tableRows = "";

        subjectsArray.forEach(s => {
            totalMarks += s.marks;
            tableRows += `<tr><td>${s.name}</td><td class="text-center">${s.marks}</td><td class="text-center">100</td></tr>`;
        });

        var percentage = ((totalMarks / maxPossibleMarks) * 100).toFixed(2);
        var grade = "";
        var gradeClass = "bg-primary";

        if (percentage >= 80) { grade = "A-1"; gradeClass = "bg-success"; }
        else if (percentage >= 70) { grade = "A"; gradeClass = "bg-info"; }
        else if (percentage >= 60) { grade = "B"; gradeClass = "bg-warning text-dark"; }
        else if (percentage >= 50) { grade = "C"; gradeClass = "bg-secondary"; }
        else if (percentage >= 40) { grade = "D"; gradeClass = "bg-dark"; }
        else { grade = "Fail"; gradeClass = "bg-danger"; }

        output.innerHTML = `
            <div class="row mb-3">
                <div class="col-6"><strong>Student:</strong> ${name}</div>
                <div class="col-6 text-end"><strong>Roll No:</strong> ${roll}</div>
            </div>
            
            <table class="table table-bordered table-hover mt-3">
                <thead class="table-light text-center">
                    <tr>
                        <th>Subject</th>
                        <th>Obtained</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody>
                    ${tableRows}
                </tbody>
                <tfoot class="table-group-divider">
                    <tr class="fw-bold">
                        <td>Grand Total</td>
                        <td class="text-center">${totalMarks}</td>
                        <td class="text-center">${maxPossibleMarks}</td>
                    </tr>
                </tfoot>
            </table>

            <div class="mt-4 p-3 border rounded bg-light d-flex justify-content-between align-items-center">
                <div>
                    <h5 class="mb-1">Percentage: <span class="text-primary">${percentage}%</span></h5>
                    <p class="mb-0 text-muted">Status: ${percentage >= 40 ? 'Passed' : 'Failed'}</p>
                </div>
                <div class="text-center">
                    <span class="badge ${gradeClass} badge-grade">${grade}</span>
                    <div class="small text-muted mt-1">Final Grade</div>
                </div>
            </div>
        `;

        resultCard.style.display = "block";
        resultCard.scrollIntoView({ behavior: 'smooth' });
    }

    function resetForm() {
        if(confirm("Are you sure you want to clear everything?")) {
            subjectsArray = [];
            document.getElementById("name").value = "";
            document.getElementById("rollNo").value = "";
            document.getElementById("subject").value = "";
            document.getElementById("marks").value = "";
            document.getElementById("subjectsList").innerHTML = "";
            document.getElementById("resultCard").style.display = "none";
        }
    }
</script>

</body>
</html>
